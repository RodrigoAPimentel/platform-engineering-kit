name: Validate Repository Language

on:
  pull_request:
    paths:
      - '*.md'
      - '.github/**/*.md'
      - 'ai/**/*.md'
      - 'docs/**/*.md'
      - 'security/**/*.md'
      - 'scripts/**/*.md'
      - 'scripts/**/*.sh'
      - 'ci-cd/github-actions/validate-repository-language.yml'
      - 'scripts/utils/validate-english-content.sh'
  push:
    branches:
      - main
      - develop
    paths:
      - '*.md'
      - '.github/**/*.md'
      - 'ai/**/*.md'
      - 'docs/**/*.md'
      - 'security/**/*.md'
      - 'scripts/**/*.md'
      - 'scripts/**/*.sh'
      - 'ci-cd/github-actions/validate-repository-language.yml'
      - 'scripts/utils/validate-english-content.sh'

jobs:
  repository-language:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Ripgrep
        run: sudo apt update && sudo apt install ripgrep -y

      - name: Validate English-only policy
        run: scripts/utils/validate-english-content.sh

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: "javascript,python"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
