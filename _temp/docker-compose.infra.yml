name: ${PROJECT_NAME}_infra

services:
  nginx:
    build: 
      context: ./proxy/support
      args:
        - NGINX_IMAGE=${NGINX_IMAGE}
    container_name: nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
      - "${NGINX_MANAGER_PORT}:81"
    volumes:
      - nginx_data:/data
      - nginx_data:/etc/letsencrypt
      - ./proxy/nginx.conf.template:/data/nginx/custom/http_top2.conf
      - ./proxy:/custom
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PUID: 1000
      PGID: 1000
      TZ: "America/Sao_Paulo"
      DISABLE_IPV6: 'true'
      INITIAL_ADMIN_EMAIL: ${NGINX_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${NGINX_PASSWORD}
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 5s
      timeout: 15s
      retries: 5
      start_period: 40s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    sysctls:
      net.core.somaxconn: "65535"
      net.ipv4.ip_local_port_range: "10240 65535"
    networks:
      - network
    env_file:
      - ../.env
      - .env.infra
      - ../services/.env.services
      - ../data_collect/.env.data_collect
      - ../observability/.env.observability
  
  portainer:
    image: ${PORTAINER_IMAGE}
    container_name: portainer
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    command:
      - --admin-password=${PORTAINER_HASHED_PASSWORD}
      - --base-url=/${PORTAINER_CONF_SUBPATH}
      - --trusted-origins=${NGINX_CONF_SERVER_NAME}
    ports:
      - ${PORTAINER_PORT}:9443
    networks:
      - network
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--quiet", "--tries=1", "--spider", "https://localhost:9443/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - ../.env
      - .env.infra

volumes:
  nginx_data:
    name: ${NGINX_VOLUME}
  portainer_data:
    name: ${PORTAINER_VOLUME}

networks:
  network:
    driver: ${NETWORK_DRIVER}
    driver_opts:
      com.docker.network.driver.mtu: ${NETWORK_MTU:-1500}
      com.docker.network.bridge.enable_ip_masquerade: "${NETWORK_ENABLE_IP_MASQUERADE:-true}"
      com.docker.network.bridge.enable_icc: "${NETWORK_ENABLE_ICC:-true}"
    name: ${NETWORK_NAME}