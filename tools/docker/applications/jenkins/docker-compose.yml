name: ${PROJECT_NAME}-stack

services:
  app:
    image: ${IMAGE_NAME}:${IMAGE_VERSION}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE}
        BUILD_PROFILE: ${APP_ENV}
        APP_ENV: ${APP_ENV}
        APP_UID: ${APP_UID}
        APP_GID: ${APP_GID}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    env_file: .env
    ports:
      - "${APP_PORT}:8080"
      - "${APP_AGENT_COMMUNICATION_PORT}:50000"
    volumes:
      - volume:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/jenkins/login > /dev/null || curl -fsS http://localhost:8080/login > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    privileged: true
    user: "${APP_UID}:${APP_GID}"
    # Production defaults enabled below.
    # For development, comment read_only/tmpfs and use bind mounts.
    # read_only: true
    # tmpfs:
    #   - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Optional resource guardrails.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
          
volumes:
  volume:
    name: ${VOLUME_NAME}
    
networks:
  network:
    driver: ${NETWORK_DRIVER}
    driver_opts:
      com.docker.network.driver.mtu: ${NETWORK_MTU}
      com.docker.network.bridge.enable_ip_masquerade: "${NETWORK_ENABLE_IP_MASQUERADE}"
      com.docker.network.bridge.enable_icc: "${NETWORK_ENABLE_ICC}"
    name: ${NETWORK_NAME}