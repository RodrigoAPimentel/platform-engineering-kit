name: ${PROJECT_NAME}-stack

services:
  app:
    image: ${IMAGE_NAME}:${IMAGE_VERSION}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    platform: linux/amd64
    env_file: .env
    ports:
      - "${APP_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    user: "${REDIS_INSIGHT_UID}:${REDIS_INSIGHT_GID}"
    ## Production defaults enabled below.
    ## For development, comment read_only/tmpfs and use bind mounts.
    # read_only: true
    # tmpfs:
    #   - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Optional resource guardrails.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
  
  webui:
    image: ${REDIS_INSIGHT_IMAGE}:${REDIS_INSIGHT_VERSION}
    container_name: ${REDIS_INSIGHT_CONTAINER_NAME}
    restart: unless-stopped
    env_file: .env
    volumes:
      - volume:/data 
    ports:
      - "${REDIS_INSIGHT_PORT}:5540"
    networks:
      - network
    depends_on:
      - app
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:5540/redis/', (r) => process.exit((r.statusCode >= 200 && r.statusCode < 500) ? 0 : 1)).on('error', () => process.exit(1));"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # user: "${REDIS_INSIGHT_UID}:${REDIS_INSIGHT_GID}"
    ## Production defaults enabled below.
    ## For development, comment read_only/tmpfs and use bind mounts.
    # read_only: true
    # tmpfs:
    #   - /tmp
    # security_opt:
    #   - no-new-privileges:true
    # cap_drop:
    #   - ALL
    # cap_add:
    #   - DAC_OVERRIDE
    # Optional resource guardrails.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
  
  exporter:
    image: ${REDIS_EXPORTER_IMAGE}:${REDIS_EXPORTER_VERSION}
    container_name: ${REDIS_EXPORTER_CONTAINER_NAME}
    restart: unless-stopped
    env_file: .env
    ports:
      - "${REDIS_EXPORTER_PORT}:9121"
    networks:
      - network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "/redis_exporter", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    user: "${REDIS_EXPORTER_UID}:${REDIS_EXPORTER_GID}"
    ## Production defaults enabled below.
    ## For development, comment read_only/tmpfs and use bind mounts.
    # read_only: true
    # tmpfs:
    #   - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Optional resource guardrails.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

volumes:
  volume:
    name: ${REDIS_INSIGHT_VOLUME}

networks:
  network:
    driver: ${NETWORK_DRIVER}
    driver_opts:
      com.docker.network.driver.mtu: ${NETWORK_MTU}
      com.docker.network.bridge.enable_ip_masquerade: "${NETWORK_ENABLE_IP_MASQUERADE}"
      com.docker.network.bridge.enable_icc: "${NETWORK_ENABLE_ICC}"
    name: ${NETWORK_NAME}