server {
    listen 80;
    listen [::]:80;

    # Change to your domain or IP address.
    server_name _; 

    location / {
        root   /usr/share/nginx/html/index;
        index  index.html index.htm;
    }

    # Keep Portainer routes in a separate file while using a single server block.
    include /etc/nginx/sites-enabled/portainer.locations;

    # Custom error page (optional)

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        root   /usr/share/nginx/html/error_pages;
    }
    
    location = /50x.html {
        root   /usr/share/nginx/html/error_pages;
    }
}
