server {
    listen 80;
    listen [::]:80;

    # Change to your domain or IP address.
    server_name _; 

    location / {
        root   /usr/share/nginx/html/index;
        index  index.html index.htm;
    }

    location = /nginx-exporter {
        return 301 /nginx-exporter/;
    }

    location ~ ^/nginx-exporter/(.*)$ {
        set $nginx_exporter_upstream http://nginx-exporter:9113;
        proxy_pass $nginx_exporter_upstream/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Accept-Encoding "";

        sub_filter_once off;
        sub_filter 'href="/' 'href="/nginx-exporter/';
        sub_filter 'src="/' 'src="/nginx-exporter/';
        sub_filter 'action="/' 'action="/nginx-exporter/';

        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /nginx-exporter;

        proxy_intercept_errors on;
        error_page 500 502 503 504 = /service-unavailable.html;
    }

    # Keep routes in a separate file while using a single server block.
    include /etc/nginx/sites-enabled/portainer.locations;
    include /etc/nginx/sites-enabled/jenkins.locations;
    include /etc/nginx/sites-enabled/authentik.locations;
    include /etc/nginx/sites-enabled/prometheus.locations;
    include /etc/nginx/sites-enabled/alertmanager.locations;
    include /etc/nginx/sites-enabled/grafana.locations;

    location = /service-unavailable.html {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><title>Service Unavailable</title></head><body style="font-family:sans-serif;text-align:center;margin-top:10vh;"><h1>Service Unavailable</h1><p>The requested service is currently not accessible.<br>Please try again later.</p></body></html>';
    }
    
    # Custom error page (optional)
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        root   /usr/share/nginx/html/error_pages;
    }
    
    location = /50x.html {
        root   /usr/share/nginx/html/error_pages;
    }
}
