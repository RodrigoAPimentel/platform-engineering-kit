<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Catalog</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <canvas id="antigravity-canvas"></canvas>
    <main class="shell">
        <section class="hero">
            <div class="hero-copy">
                <div class="eyebrow">NGINX Service Catalog</div>
                <h1>Service Catalog</h1>
                <p class="subtitle">Catalog of services published by Nginx. Each card is generated from files in
                    sites-enabled with proxy routes.</p>
            </div>
            <div class="meta hero-meta">
                <div id="count">Loading services...</div>
                <div id="generatedAt"></div>
            </div>
        </section>

        <div id="status" class="status">Reading service configuration...</div>
        <div id="catalog-container" aria-live="polite"></div>
    </main>

    <script>
        const serviceIcons = {
            alertmanager: { slug: "prometheus", label: "Alertmanager" },
            authentik: { slug: "authentik", label: "Authentik" },
            grafana: { slug: "grafana", label: "Grafana" },
            jenkins: { slug: "jenkins", label: "Jenkins" },
            nginxExporter: { slug: "nginx", label: "Nginx Exporter" },
            postgres: { slug: "postgresql", label: "PostgreSQL" },
            portainer: { slug: "portainer", label: "Portainer" },
            prometheus: { slug: "prometheus", label: "Prometheus" },
            redisinsight: { slug: "redis", label: "Redis Insight" },
            app: { slug: null, label: "Service" }
        };

        const countEl = document.getElementById('count');
        const generatedAtEl = document.getElementById('generatedAt');
        const statusEl = document.getElementById('status');
        const catalogEl = document.getElementById('catalog-container');
        const statusOrder = {
            online: 0,
            offline: 1,
            checking: 2
        };

        function getServiceCategory(service) {
            const src = (service.sourceFile || '').toLowerCase();
            const name = (service.name || '').toLowerCase();
            const combined = src + ' ' + name;

            const keywords = {
                'Databases': ['postgres', 'pgadmin', 'mysql', 'mariadb', 'redis', 'mongo', 'mssql', 'oracle', 'sqlite', 'rabbitmq', 'kafka', 'nats', 'pulsar', 'clickhouse', 'cassandra', 'scylla', 'surrealdb', 'db', 'database', 'sql', 'nosql', 'broker', 'queue'],
                'Security': ['vault', 'snyk', 'trivy', 'falco', 'aqua', 'checkov', 'sonarqube', 'security', 'auth', 'oauth', 'identity', 'cert', 'keycloak', 'authentik'],
                'Networking & Proxy': ['nginx', 'traefik', 'haproxy', 'istio', 'linkerd', 'cilium', 'envoy', 'caddy', 'proxy', 'gateway', 'loadbalancer', 'network', 'vpn', 'dns'],
                'Infrastructure & DevOps': ['portainer', 'jenkins', 'gitlab', 'github', 'argocd', 'flux', 'harbor', 'rancher', 'nomad', 'consul', 'terraform', 'ansible', 'container', 'orchestration', 'deploy', 'pipeline', 'cicd', 'infra'],
                'Observability': ['prometheus', 'grafana', 'alertmanager', 'vmalert', 'loki', 'tempo', 'jaeger', 'zabbix', 'netdata', 'exporter', 'metrics', 'dashboard', 'tracing', 'logging', 'kibana', 'elasticsearch', 'fluentd', 'logstash', 'monitoring', 'stats']
            };

            for (const [category, words] of Object.entries(keywords)) {
                if (words.some(word => combined.includes(word))) {
                    return category;
                }
            }

            return 'Others';
        }

        function safeHostname() {
            const host = window.location.hostname || 'localhost';
            return host;
        }

        function buildProxyUrl(route) {
            return route;
        }

        function normalizeServiceKey(value = '') {
            return String(value || '').toLowerCase().replace(/\..*$/, '');
        }

        function resolveIconKey(service) {
            const sourceKey = normalizeServiceKey(service.sourceFile || '');
            const nameKey = normalizeServiceKey(service.name || '');

            if (sourceKey.includes('alertmanager') || nameKey.includes('alertmanager')) return 'alertmanager';
            if (sourceKey.includes('authentik') || nameKey.includes('authentik')) return 'authentik';
            if (sourceKey.includes('grafana') || nameKey.includes('grafana') || nameKey.includes('dashboard')) return 'grafana';
            if (sourceKey.includes('jenkins') || nameKey.includes('jenkins')) return 'jenkins';
            if (sourceKey.includes('nginx-exporter') || nameKey.includes('nginx exporter') || nameKey.includes('exporter')) return 'nginxExporter';
            if (sourceKey.includes('postgres') || nameKey.includes('postgres') || nameKey.includes('postgresql')) return 'postgres';
            if (sourceKey.includes('portainer') || nameKey.includes('portainer')) return 'portainer';
            if (sourceKey.includes('prometheus') || nameKey.includes('prometheus') || nameKey.includes('metrics')) return 'prometheus';
            if (sourceKey.includes('redis') || nameKey.includes('redis') || nameKey.includes('insight')) return 'redisinsight';

            return 'app';
        }

        function getServiceIconMeta(service) {
            const key = resolveIconKey(service);
            return serviceIcons[key] || serviceIcons.app;
        }

        function normalizeCardName(value = '') {
            return String(value || '')
                .replace(/\.locations$/i, '')
                .replace(/\.conf$/i, '')
                .replace(/\.exporter$/i, '')
                .trim();
        }

        function formatServiceDisplayName(rawName = '') {
            const normalized = normalizeCardName(rawName).toLowerCase();
            const knownNames = {
                index: 'Nginx Exporter',
                pgadmin: 'PgAdmin',
                redisinsight: 'RedisInsight'
            };

            if (knownNames[normalized]) {
                return knownNames[normalized];
            }

            return normalizeCardName(rawName)
                .split(/[^a-zA-Z0-9]+/)
                .filter(Boolean)
                .map((part) => part.charAt(0).toUpperCase() + part.slice(1).toLowerCase())
                .join(' ');
        }

        function getServiceBaseName(service) {
            const sourceBase = normalizeCardName(service.sourceFile || '');
            if (sourceBase) {
                return sourceBase;
            }

            return normalizeCardName(service.name || 'service');
        }

        function getFallbackIconLabel(service) {
            const baseName = getServiceBaseName(service);
            const compact = baseName
                .split(/[^a-zA-Z0-9]+/)
                .filter(Boolean)
                .slice(0, 2)
                .map((part) => part.charAt(0).toUpperCase())
                .join('');

            return compact || 'S';
        }

        function getCardLabel(service) {
            return formatServiceDisplayName(getServiceBaseName(service)) || 'Service';
        }

        function compareServicesByStatusAndName(left, right) {
            const leftPriority = statusOrder[left.status] ?? statusOrder.checking;
            const rightPriority = statusOrder[right.status] ?? statusOrder.checking;

            if (leftPriority !== rightPriority) {
                return leftPriority - rightPriority;
            }

            return getCardLabel(left).localeCompare(getCardLabel(right), undefined, { sensitivity: 'base' });
        }

        function getCategoryIcon(catName) {
            const icons = {
                'Observability': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 5 18 3-9h5"/></svg>',
                'Databases': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>',
                'Infrastructure & DevOps': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>',
                'Security': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
                'Networking & Proxy': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>',
                'Others': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>'
            };
            return icons[catName] || icons['Others'];
        }

        function renderCategories(services) {
            const categories = {
                'Observability': [],
                'Databases': [],
                'Security': [],
                'Networking & Proxy': [],
                'Infrastructure & DevOps': [],
                'Others': []
            };
            const sortedServices = services.slice().sort(compareServicesByStatusAndName);
            for (const service of sortedServices) {
                categories[getServiceCategory(service)].push(service);
            }
            let html = '';
            for (const [catName, catServices] of Object.entries(categories)) {
                if (catServices.length === 0) continue;
                html += `<div class="category-block" data-category="${catName}">`;
                html += `<div class="category-watermark">${getCategoryIcon(catName)}</div>`;
                html += `<h2 class="category-header">${getCategoryIcon(catName)} <span>${catName}</span></h2>`;
                html += `<section class="grid" aria-live="polite">`;
                html += catServices.map(cardTemplate).join('');
                html += `</section></div>`;
            }
            catalogEl.innerHTML = html;
            wireIconFallbacks();
        }

        function reorderCatalogCards() {
            const grids = document.querySelectorAll('.grid');
            grids.forEach(grid => {
                const cards = Array.from(grid.querySelectorAll('.card'));
                cards.sort((a, b) => {
                    const statusA = Array.from(a.classList).find(c => c.startsWith('status-')) || 'status-checking';
                    const statusB = Array.from(b.classList).find(c => c.startsWith('status-')) || 'status-checking';
                    const stateOrder = { 'status-online': 0, 'status-offline': 1, 'status-checking': 2 };
                    const pA = stateOrder[statusA] ?? 2;
                    const pB = stateOrder[statusB] ?? 2;
                    if (pA !== pB) return pA - pB;
                    return a.querySelector('.title').textContent.localeCompare(b.querySelector('.title').textContent, undefined, { sensitivity: 'base' });
                });
                grid.replaceChildren(...cards);
            });
        }

        function choosePrimaryRoute(service) {
            const routes = Array.isArray(service.routes) && service.routes.length
                ? service.routes
                : [service.route].filter(Boolean);

            if (!routes.length) {
                return '/';
            }

            const primaryRoutes = routes.filter((route) => {
                const r = String(route || '').toLowerCase();
                return !r.includes('.exporter') && !r.includes('health') && !r.includes('api');
            });

            if (primaryRoutes.length > 0) {
                primaryRoutes.sort((a, b) => a.length - b.length);
                return primaryRoutes[0];
            }

            const anyPrimary = routes.filter((route) => {
                const r = String(route || '').toLowerCase();
                return !r.includes('.exporter') && !r.includes('health');
            });
            anyPrimary.sort((a, b) => a.length - b.length);
            return anyPrimary[0] || routes.find((r) => !r.toLowerCase().includes('.exporter')) || routes[0];
        }

        function chooseExporterRoute(routes = []) {
            return routes.find((route) => String(route || '').toLowerCase().includes('.exporter')) || null;
        }

        function chooseHealthCheckRoute(routes = []) {
            return routes.find((route) => String(route || '').toLowerCase().includes('health')) || null;
        }

        function groupServicesByCard(services) {
            const grouped = new Map();

            for (const item of services) {
                const sourceFile = item.sourceFile || 'unknown';
                const key = sourceFile;

                if (!grouped.has(key)) {
                    grouped.set(key, {
                        ...item,
                        routes: [],
                        upstreams: []
                    });
                }

                const group = grouped.get(key);
                const route = item.route || item.proxyUrl;
                if (route && !group.routes.includes(route)) {
                    group.routes.push(route);
                }

                const upstream = item.upstream || 'N/A';
                if (upstream && !group.upstreams.includes(upstream)) {
                    group.upstreams.push(upstream);
                }
            }

            return Array.from(grouped.values()).map((service) => {
                const primaryRoute = choosePrimaryRoute(service);
                const exporterRoute = chooseExporterRoute(service.routes);
                const healthCheckRoute = chooseHealthCheckRoute(service.routes);

                return {
                    ...service,
                    route: primaryRoute,
                    proxyUrl: primaryRoute,
                    exporterRoute,
                    healthCheckUrl: healthCheckRoute,
                    slug: (service.sourceFile || service.slug || service.name || 'service').toLowerCase().replace(/[^a-z0-9_-]/g, '-'),
                    icon: resolveIconKey(service),
                    upstream: (service.upstreams && service.upstreams[0]) || service.upstream || 'N/A'
                };
            });
        }

        function cardTemplate(service) {
            const proxyUrl = buildProxyUrl(service.proxyUrl || service.route);
            const exporterUrl = service.exporterRoute ? buildProxyUrl(service.exporterRoute) : null;
            const cardName = getCardLabel(service);
            const iconMeta = getServiceIconMeta(service);
            const fallbackLabel = getFallbackIconLabel(service);
            const upstreams = Array.isArray(service.upstreams) && service.upstreams.length
                ? service.upstreams
                : [service.upstream || 'N/A'];
            const safeSlug = (service.slug || service.name || 'service').replace(/[^a-zA-Z0-9_-]/g, '-');
            const routes = Array.isArray(service.routes) && service.routes.length
                ? service.routes
                : [service.route].filter(Boolean);
            const routesHtml = routes
                .map((route) => `<span class="resource-link">${route} <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>`)
                .join('');
            const upstreamHtml = upstreams
                .map((upstream) => `<span class="resource-link">${upstream} <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>`)
                .join('');

            return `
                <article class="card status-checking" data-service-slug="${safeSlug}" data-proxy-url="${proxyUrl}">
                    <div class="card-head">
                        <div class="icon" aria-hidden="true">
                            ${iconMeta.slug ? `<img class="service-icon" src="https://cdn.simpleicons.org/${iconMeta.slug}/0f172a" alt="${iconMeta.label} logo" loading="lazy" data-fallback="${fallbackLabel}">` : `<span class="service-icon-fallback">${fallbackLabel}</span>`}
                        </div>
                        <div class="card-heading">
                            <div class="title-row">
                                <h2 class="title">${cardName}</h2>
                                <div class="status-pill checking" data-health="${safeSlug}">Checking</div>
                            </div>
                            <span class="tag">${service.sourceFile}</span>
                        </div>
                    </div>
                    <div class="info">
                        <details class="clean-details">
                            <summary>Details</summary>
                            <div class="resources-list">
                                <div class="resource-group">
                                    <span class="resource-label">Routes (${routes.length})</span>
                                    ${routesHtml}
                                </div>
                                <div class="resource-group">
                                    <span class="resource-label">Proxies (${upstreams.length})</span>
                                    ${upstreamHtml}
                                </div>
                            </div>
                        </details>
                    </div>
                    <div class="actions">
                        <a class="btn proxy" href="${proxyUrl}" target="_blank" rel="noopener noreferrer">Access Service</a>
                        ${exporterUrl ? `<a class="btn proxy" href="${exporterUrl}" target="_blank" rel="noopener noreferrer">Access Exporter</a>` : ''}
                    </div>
                </article>
            `;
        }

        async function checkServiceHealth(proxyUrl, timeoutMs = 4500) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);

            try {
                const response = await fetch(proxyUrl, {
                    method: 'GET',
                    cache: 'no-store',
                    redirect: 'follow',
                    signal: controller.signal,
                    headers: {
                        // Suppress browser basic auth prompt by providing a dummy header
                        'Authorization': 'Basic dW5kZWZpbmVkOnVuZGVmaW5lZA=='
                    }
                });
                const body = await response.text();
                clearTimeout(timer);

                const unavailablePattern = /unavailable|currently not accessible/i;

                if ((response.ok || (response.status >= 300 && response.status < 400)) && !unavailablePattern.test(body)) {
                    return { state: 'online', label: 'Online' };
                }

                if (response.status === 401 || response.status === 403) {
                    return { state: 'online', label: 'Protected' };
                }

                const titleMatch = body.match(/<title>([^<]+)<\/title>/i);
                const bodyLabel = titleMatch ? titleMatch[1].trim() : `Offline (${response.status})`;
                return { state: 'offline', label: bodyLabel };
            } catch (error) {
                clearTimeout(timer);
                return { state: 'offline', label: 'Offline' };
            }
        }

        async function paintHealthStatuses(services) {
            const checks = services.map(async (service) => {
                const healthUrl = service.healthCheckUrl || service.proxyUrl || service.route;
                const proxyUrl = buildProxyUrl(healthUrl);
                const result = await checkServiceHealth(proxyUrl);
                service.status = result.state;

                const slug = (service.slug || service.name || 'service').replace(/[^a-zA-Z0-9_-]/g, '-');
                const el = document.querySelector(`[data-health="${slug}"]`);
                if (!el) return;

                el.classList.remove('checking');
                el.classList.add(result.state);
                el.textContent = result.label;

                const card = el.closest('.card');
                if (card) {
                    card.classList.remove('status-checking', 'status-online', 'status-offline');
                    card.classList.add(`status-${result.state}`);
                }
            });

            await Promise.all(checks);
            reorderCatalogCards();
        }

        function wireIconFallbacks() {
            document.querySelectorAll('.service-icon').forEach((icon) => {
                icon.addEventListener('error', () => {
                    const fallback = icon.dataset.fallback || 'S';
                    const container = icon.closest('.icon');
                    if (container) {
                        container.innerHTML = `<span class="service-icon-fallback">${fallback}</span>`;
                    }
                });
            });
        }

        async function loadCatalog() {
            try {
                const response = await fetch('./services.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`Failed to load services.json (${response.status})`);
                }

                const data = await response.json();
                const rawServices = Array.isArray(data.services) ? data.services : [];
                const services = groupServicesByCard(rawServices);

                countEl.textContent = `${services.length} mapped service(s)`;
                generatedAtEl.textContent = data.generatedAt
                    ? `Generated at: ${new Date(data.generatedAt).toLocaleString('en-US')}`
                    : '';

                if (!services.length) {
                    statusEl.textContent = '';
                    catalogEl.innerHTML = '<div class="empty">No proxy service was found in sites-enabled.</div>';
                    return;
                }

                statusEl.textContent = 'Catalog loaded successfully.';
                renderCategories(services);
                paintHealthStatuses(services);
            } catch (error) {
                statusEl.textContent = 'Could not load the automatic catalog.';
                catalogEl.innerHTML = `
                    <div class="empty">
                        Check whether the services.json file was generated.<br>
                        Error: ${error.message}
                    </div>
                `;
            }
        }

        loadCatalog();

        /* ── Antigravity Confetti Engine ── */
        const canvas = document.getElementById('antigravity-canvas');
        const ctx = canvas.getContext('2d');

        // Smooth mouse tracking
        let mouseNormX = 0; // -1 to 1 (left to right)
        let mouseNormY = 0; // -1 to 1 (top to bottom)
        let smoothMouseX = 0;
        let smoothMouseY = 0;

        const GOOGLE_COLORS = ['#EA4335', '#4285F4', '#FBBC05', '#34A853'];
        const SHAPE_TYPES = ['circle', 'square', 'triangle', 'plus'];
        const PARTICLE_COUNT = 80;
        const PARALLAX_STRENGTH = 60; // max px shift at depth 1.0

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => { resizeCanvas(); seedParticles(); });
        resizeCanvas();

        // Poisson-ish distribution: divide viewport into a grid and jitter
        function poissonSeed(count, w, h) {
            const cols = Math.ceil(Math.sqrt(count * (w / h)));
            const rows = Math.ceil(count / cols);
            const cellW = w / cols;
            const cellH = h / rows;
            const pts = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (pts.length >= count) break;
                    pts.push({
                        x: (c + Math.random()) * cellW,
                        y: (r + Math.random()) * cellH
                    });
                }
            }
            return pts;
        }

        class Confetti {
            constructor(x, y) {
                this.baseX = x;
                this.baseY = y;
                this.depth = Math.random() * 0.8 + 0.2;     // 0.2 – 1.0 (far – near)
                this.size = (4 + Math.random() * 8) * this.depth; // 1–9 px effective
                this.color = GOOGLE_COLORS[Math.floor(Math.random() * 4)];
                this.shape = SHAPE_TYPES[Math.floor(Math.random() * 4)];
                this.angle = Math.random() * Math.PI * 2;
                this.angleV = (Math.random() - 0.5) * 0.02;  // slow self-rotation
                this.floatSpeed = (0.15 + Math.random() * 0.35) * this.depth;
                this.driftX = (Math.random() - 0.5) * 0.2;
                this.opacity = 0.55 + this.depth * 0.35;     // far = faint, near = vivid
                this.y = this.baseY;
                this.x = this.baseX;
            }
            update() {
                // Gentle upward float
                this.y -= this.floatSpeed;
                this.x += this.driftX;
                this.angle += this.angleV;
                // Wrap when off screen
                if (this.y < -40) this.y = canvas.height + 40;
                if (this.x < -40) this.x = canvas.width + 40;
                if (this.x > canvas.width + 40) this.x = -40;
            }
            draw(ctx, px, py) {
                // Parallax offset: deeper particles move less
                const offX = px * this.depth;
                const offY = py * this.depth;
                const drawX = this.x + offX;
                const drawY = this.y + offY;

                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(drawX, drawY);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                const s = this.size;
                const hs = s / 2;

                switch (this.shape) {
                    case 'circle':
                        ctx.beginPath();
                        ctx.arc(0, 0, hs, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 'square':
                        ctx.fillRect(-hs, -hs, s, s);
                        break;
                    case 'triangle':
                        ctx.beginPath();
                        ctx.moveTo(0, -hs);
                        ctx.lineTo(hs, hs);
                        ctx.lineTo(-hs, hs);
                        ctx.closePath();
                        ctx.fill();
                        break;
                    case 'plus': {
                        const t = s * 0.28;
                        ctx.fillRect(-t / 2, -hs, t, s);
                        ctx.fillRect(-hs, -t / 2, s, t);
                        break;
                    }
                }
                ctx.restore();
            }
        }

        let confetti = [];

        function seedParticles() {
            confetti = [];
            const positions = poissonSeed(PARTICLE_COUNT, canvas.width, canvas.height);
            positions.forEach(p => confetti.push(new Confetti(p.x, p.y)));
        }
        seedParticles();

        document.addEventListener('mousemove', (e) => {
            mouseNormX = (e.clientX / window.innerWidth - 0.5) * 2; // -1 … 1
            mouseNormY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        function tick() {
            // Smooth interpolation toward target mouse position
            smoothMouseX += (mouseNormX - smoothMouseX) * 0.08;
            smoothMouseY += (mouseNormY - smoothMouseY) * 0.08;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Global parallax offset (opposite direction of mouse)
            const px = -smoothMouseX * PARALLAX_STRENGTH;
            const py = -smoothMouseY * PARALLAX_STRENGTH;

            confetti.forEach(c => {
                c.update();
                c.draw(ctx, px, py);
            });

            requestAnimationFrame(tick);
        }
        tick();
    </script>
</body>
