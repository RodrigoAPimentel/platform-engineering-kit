user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;

pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Resolves container names at runtime so that nginx can start even without an active upstream.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 2s;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    keepalive_timeout  65;

    # Rate-limiting zone for WAHA API endpoints (10 req/s per client IP, 10MB shared memory).
    limit_req_zone $binary_remote_addr zone=waha_api_limit:10m rate=10r/s;

    # Loads the settings for individual websites.
    include /etc/nginx/sites-enabled/*.conf;
}
