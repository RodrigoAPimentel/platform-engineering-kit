name: ${PROJECT_NAME}-stack

services:
  app:
    image: ${IMAGE_NAME:-your-org/your-app}:${IMAGE_VERSION:-1.0.0}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    env_file: .env
    ports:
      - "${APP_PORT}:9093"
    volumes:
      - ./configs/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - volume:/data
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/data
    networks:
      - network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    user: "${APP_UID}:${APP_GID}"
    ## Production defaults enabled below.
    ## For development, comment read_only/tmpfs and use bind mounts.
    # read_only: true
    # tmpfs:
    #   - /tmp
    # Add least-privilege security options for Linux hosts.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Optional resource guardrails.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
          
volumes:
  volume:
    name: ${VOLUME_NAME}
    
networks:
  network:
    driver: ${NETWORK_DRIVER}
    driver_opts:
      com.docker.network.driver.mtu: ${NETWORK_MTU}
      com.docker.network.bridge.enable_ip_masquerade: "${NETWORK_ENABLE_IP_MASQUERADE}"
      com.docker.network.bridge.enable_icc: "${NETWORK_ENABLE_ICC}"
    name: ${NETWORK_NAME}