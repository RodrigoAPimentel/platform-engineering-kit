version: '3.9'

services:
  portainer:
    image: portainer/portainer-ce:2.19.4
    container_name: portainer-modern
    ports:
      - "9443:9443"
      - "9000:9000"
    volumes:
      - portainer-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - tools
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:9443"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  portainer-data:
    name: portainer-data

networks:
  tools:
    name: tools
