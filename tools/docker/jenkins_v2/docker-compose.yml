
name: jenkins-v2-stack

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: jenkins-modern:2.0.0
    container_name: jenkins-modern
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - tools
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 2048M

volumes:
  jenkins-data:
    name: jenkins-data

networks:
  tools:
    name: tools
